server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /steamgriddb-api/ {
    proxy_pass https://www.steamgriddb.com/api/v2/;
    proxy_ssl_server_name on;
    proxy_set_header Host www.steamgriddb.com;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /steamgriddb-cdn/ {
    rewrite ^/steamgriddb-cdn/(.*)$ /$1 break;
    proxy_pass https://cdn2.steamgriddb.com;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn2.steamgriddb.com;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
