<main class="page-shell">
  <section class="hero">
    <div>
      <h1>{{ projectName }}</h1>
    </div>

    <p class="hero-note">Unofficial. Not affiliated with iiSU.</p>
  </section>

  <section class="workspace" aria-label="Image mask editor">
    <article class="panel panel-editor">
      <div class="panel-header">
        <h2>1. Upload</h2>
        @if (hasImage()) {
          <button class="ghost-button" type="button" (click)="resetCrop()">Reset</button>
        }
      </div>

      <label class="upload-card" for="image-upload">
        <input
          id="image-upload"
          type="file"
          accept="image/png,image/jpeg,image/webp,image/gif"
          (change)="onFileSelected($event)"
        />
        <span class="upload-title">Open image</span>
      </label>

      @if (hasImage()) {
        <div class="crop-section">
          <div class="panel-header panel-header-compact">
            <h2>2. Edit</h2>
            <button class="ghost-button" type="button" (click)="toggleGrid()">
              {{ isGridVisible() ? 'Hide grid' : 'Show grid' }}
            </button>
          </div>

          <div
            class="crop-stage"
            [class.is-dragging]="isDragging()"
            (pointerdown)="onPointerDown($event)"
            role="application"
            aria-label="Square crop area"
          >
            <div
              class="crop-grid"
              [class.crop-grid-hidden]="!isGridVisible()"
              aria-hidden="true"
            ></div>
            <img
              [src]="currentImage()?.sourceUrl"
              alt="Preview of the image being cropped"
              draggable="false"
              [style.width.px]="cropMetrics().displayWidth"
              [style.height.px]="cropMetrics().displayHeight"
              [style.left.px]="cropSize / 2 + currentOffsetX()"
              [style.top.px]="cropSize / 2 + currentOffsetY()"
              [style.transform]="'translate(-50%, -50%) rotate(' + currentRotation() + 'deg)'"
            />
            <div class="crop-frame" aria-hidden="true"></div>
          </div>

          <div class="flex w-full items-start justify-stretch gap-10">
            <div class="w-full">
              <label class="slider-field" for="zoom-control">
                <span>Zoom</span>
                <input
                  id="zoom-control"
                  type="range"
                  [min]="minZoom"
                  [max]="maxZoom"
                  step="0.01"
                  class="w-full"
                  [value]="currentZoom()"
                  (input)="onZoomChange($event)"
                />
              </label>
            </div>
            <div class="flex flex-col w-full">
              <label class="slider-field" for="rotation-control">
                <span>Rotate</span>
                <input
                  id="rotation-control"
                  type="range"
                  [min]="minRotation"
                  [max]="maxRotation"
                  step="0.1"
                  [value]="currentRotation()"
                  (input)="onRotationChange($event)"
                />
              </label>
              <div class="quick-actions" aria-label="Rotation controls">
                <button class="ghost-button" type="button" (click)="rotateBy(-5)">-5°</button>
                <button class="ghost-button" type="button" (click)="rotateBy(5)">+5°</button>
                <button class="ghost-button" type="button" (click)="rotateBy(-90)">Left</button>
                <button class="ghost-button" type="button" (click)="rotateBy(90)">Right</button>
              </div>
            </div>
          </div>
        </div>
      } @else {
        <div class="empty-state" aria-live="polite">
          <p>No image.</p>
        </div>
      }
    </article>

    <article class="panel panel-output">
      <div class="panel-header">
        <h2>3. Export</h2>
      </div>

      <div class="result-stage">
        @if (currentOutputUrl(); as outputUrl) {
          <img
            class="result-image"
            [src]="outputUrl"
            alt="Preview of the final icon with the mask applied"
            width="512"
            height="512"
          />
        } @else {
          <div class="result-placeholder" aria-live="polite">
            <p>No preview.</p>
          </div>
        }
      </div>

      <div class="result-actions">
        <button
          class="primary-button"
          type="button"
          [disabled]="!currentOutputUrl()"
          (click)="downloadResult()"
        >
          Download PNG
        </button>
      </div>
    </article>
  </section>
</main>
